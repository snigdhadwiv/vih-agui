<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Revenue Dashboard — Agentic UI Demo</title>
  <meta name="description" content="Live demo of the Agentic UI framework-agnostic plugin on a plain HTML dashboard."/>
  <style>
    :root {
      --brand: #5eead4; --bg: #0f1216; --card: #171b22; --card2: #1e2430;
      --text: #e7eaee; --muted: #8b93a1; --border: rgba(255,255,255,0.08);
      --positive: #4ade80; --negative: #f87171; --amber: #f59e0b;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, "Inter", "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      background: linear-gradient(180deg, rgba(30,36,48,0.8) 0%, transparent 100%);
    }
    .header-left h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .header-left p { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .header-actions { display: flex; gap: 8px; }
    .header-actions button {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .header-actions button:hover { border-color: var(--brand); color: var(--brand); }

    /* Main layout */
    main { max-width: 1200px; margin: 0 auto; padding: 28px 32px 80px; }

    /* KPI Grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: border-color .2s, box-shadow .2s;
    }
    .kpi-card:hover { border-color: rgba(94,234,212,0.2); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .kpi-card .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .kpi-card .value { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .kpi-card .delta { font-size: 12px; margin-top: 5px; }
    .kpi-card .delta.up { color: var(--positive); }
    .kpi-card .delta.down { color: var(--negative); }

    /* Section */
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 15px; font-weight: 600; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px; color: var(--text);
    }
    .section-title::before {
      content: ''; display: inline-block; width: 3px; height: 16px;
      background: var(--brand); border-radius: 2px;
    }

    /* Panel */
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }

    /* Chart: Revenue bar chart */
    #revenue-chart svg { width: 100%; overflow: visible; }

    /* Orders table */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 500;
    }
    td {
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
    .badge {
      display: inline-block; padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-paid    { background: rgba(74,222,128,.15); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }
    .badge-pending { background: rgba(245,158,11,.15); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
    .badge-refunded{ background: rgba(248,113,113,.15); color: #f87171; border: 1px solid rgba(248,113,113,.3); }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all .15s;
    }
    .filter-tab.active { background: rgba(94,234,212,0.12); border-color: rgba(94,234,212,0.35); color: var(--brand); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Revenue Dashboard</h1>
    <p>Last 7 days · Updated just now</p>
  </div>
  <div class="header-actions">
    <button>This Week</button>
    <button>This Month</button>
    <button>Export</button>
  </div>
</header>

<main>
  <!-- KPI Cards -->
  <div class="kpi-grid">
    <div class="kpi-card" id="kpi-card-revenue" data-kpi data-label="Revenue (MTD)" data-value="$482,300">
      <div class="label">Revenue (MTD)</div>
      <div class="value">$482,300</div>
      <div class="delta up">▲ 8.4% vs last month</div>
    </div>
    <div class="kpi-card" id="kpi-card-orders" data-kpi data-label="Orders" data-value="3,204">
      <div class="label">Orders</div>
      <div class="value">3,204</div>
      <div class="delta up">▲ 2.1% vs last month</div>
    </div>
    <div class="kpi-card" id="kpi-card-churn" data-kpi data-label="Churn Rate" data-value="2.1%">
      <div class="label">Churn Rate</div>
      <div class="value">2.1%</div>
      <div class="delta down">▼ 0.4% vs last month</div>
    </div>
    <div class="kpi-card" id="kpi-card-arpu" data-kpi data-label="Avg Order Value" data-value="$150">
      <div class="label">Avg Order Value</div>
      <div class="value">$150</div>
      <div class="delta up">▲ 5.2% vs last month</div>
    </div>
  </div>

  <!-- Revenue Trend -->
  <div class="section">
    <div class="panel">
      <div class="section-header">
        <div class="section-title">Revenue Trend</div>
        <span style="font-size:11px;color:var(--muted)">Daily · This week</span>
      </div>
      <div id="revenue-chart">
        <svg viewBox="0 0 600 180">
          <defs>
            <linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#5eead4" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <!-- Grid lines -->
          <line x1="50" y1="10" x2="50" y2="130" stroke="rgba(255,255,255,0.12)"/>
          <line x1="50" y1="130" x2="584" y2="130" stroke="rgba(255,255,255,0.12)"/>
          <line x1="50" y1="44" x2="584" y2="44" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3 5"/>
          <line x1="50" y1="77" x2="584" y2="77" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3 5"/>
          <line x1="50" y1="110" x2="584" y2="110" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3 5"/>
          <!-- Y labels -->
          <text x="44" y="48" fill="#8b93a1" font-size="9" text-anchor="end">$72k</text>
          <text x="44" y="81" fill="#8b93a1" font-size="9" text-anchor="end">$60k</text>
          <text x="44" y="114" fill="#8b93a1" font-size="9" text-anchor="end">$48k</text>
          <!-- Area fill -->
          <polygon points="50,103 128,97 207,99 285,86 363,75 442,93 520,108 520,130 50,130"
            fill="url(#rg)"/>
          <!-- Line -->
          <polyline points="50,103 128,97 207,99 285,86 363,75 442,93 520,108"
            fill="none" stroke="#5eead4" stroke-width="2.5" stroke-linejoin="round"/>
          <!-- Dots -->
          <circle cx="50"  cy="103" r="4.5" fill="#5eead4" stroke="#171b22" stroke-width="2"/>
          <circle cx="128" cy="97"  r="4.5" fill="#5eead4" stroke="#171b22" stroke-width="2"/>
          <circle cx="207" cy="99"  r="4.5" fill="#5eead4" stroke="#171b22" stroke-width="2"/>
          <circle cx="285" cy="86"  r="4.5" fill="#5eead4" stroke="#171b22" stroke-width="2"/>
          <circle cx="363" cy="75"  r="4.5" fill="#5eead4" stroke="#171b22" stroke-width="2"/>
          <circle cx="442" cy="93"  r="4.5" fill="#5eead4" stroke="#171b22" stroke-width="2"/>
          <circle cx="520" cy="108" r="4.5" fill="#5eead4" stroke="#171b22" stroke-width="2"/>
          <!-- X labels -->
          <text x="50"  y="148" fill="#8b93a1" font-size="10" text-anchor="middle">Mon</text>
          <text x="128" y="148" fill="#8b93a1" font-size="10" text-anchor="middle">Tue</text>
          <text x="207" y="148" fill="#8b93a1" font-size="10" text-anchor="middle">Wed</text>
          <text x="285" y="148" fill="#8b93a1" font-size="10" text-anchor="middle">Thu</text>
          <text x="363" y="148" fill="#8b93a1" font-size="10" text-anchor="middle">Fri</text>
          <text x="442" y="148" fill="#8b93a1" font-size="10" text-anchor="middle">Sat</text>
          <text x="520" y="148" fill="#8b93a1" font-size="10" text-anchor="middle">Sun</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- Orders Table -->
  <div class="section">
    <div class="panel">
      <div class="section-header">
        <div class="section-title">Recent Orders</div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterOrders('all',this)">All</button>
          <button class="filter-tab" onclick="filterOrders('paid',this)">Paid</button>
          <button class="filter-tab" onclick="filterOrders('pending',this)">Pending</button>
          <button class="filter-tab" onclick="filterOrders('refunded',this)">Refunded</button>
        </div>
      </div>
      <table id="orders-table">
        <thead>
          <tr>
            <th>Order</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- =========================================================
     Agentic UI Plugin — works in any tech stack
     ========================================================= -->
<script type="module" src="./vendor/agentic-widget.js"></script>
<agentic-ui-agent endpoint="http://localhost:4411"></agentic-ui-agent>

<script>
  // ---- Orders data (mimics a real API) ----
  const ALL_ORDERS = [
    { id: '#1042', customer: 'Acme Co',       amount: 1200,  status: 'paid',     date: 'Jul 7' },
    { id: '#1043', customer: 'Globex Corp',   amount: 860,   status: 'pending',  date: 'Jul 6' },
    { id: '#1044', customer: 'Initech',       amount: 2430,  status: 'paid',     date: 'Jul 6' },
    { id: '#1045', customer: 'Umbrella Corp', amount: 990,   status: 'refunded', date: 'Jul 5' },
    { id: '#1046', customer: 'Soylent LLC',   amount: 1710,  status: 'paid',     date: 'Jul 5' },
    { id: '#1047', customer: 'Dunder Mifflin',amount: 540,   status: 'pending',  date: 'Jul 4' },
    { id: '#1048', customer: 'Vandelay Ind',  amount: 3200,  status: 'paid',     date: 'Jul 4' },
  ];

  function renderOrders(data) {
    const body = document.getElementById('orders-body');
    body.innerHTML = data.map((o, i) => `
      <tr>
        <td>${o.id}</td>
        <td>${o.customer}</td>
        <td>$${o.amount.toLocaleString()}</td>
        <td><span class="badge badge-${o.status}">${o.status}</span></td>
        <td style="color:var(--muted)">${o.date}</td>
      </tr>`).join('');
  }

  function filterOrders(status, btn) {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(status === 'all' ? ALL_ORDERS : ALL_ORDERS.filter(o => o.status === status));
  }

  renderOrders(ALL_ORDERS);

  // ---- Register data providers for Agentic UI ----
  window.__agenticUI = window.__agenticUI || {};
  window.__agenticUI.dataProviders = {
    kpis: async () => [
      { label: 'Revenue (MTD)', value: '$482,300', id: 'kpi-card-revenue' },
      { label: 'Orders',        value: '3,204',    id: 'kpi-card-orders'  },
      { label: 'Churn Rate',    value: '2.1%',     id: 'kpi-card-churn'   },
      { label: 'Avg Order',     value: '$150',     id: 'kpi-card-arpu'    },
    ],
    revenueTrend: async () => [
      { day: 'Mon', revenue: 58000 }, { day: 'Tue', revenue: 61200 },
      { day: 'Wed', revenue: 59800 }, { day: 'Thu', revenue: 67300 },
      { day: 'Fri', revenue: 72100 }, { day: 'Sat', revenue: 54200 },
      { day: 'Sun', revenue: 48900 },
    ],
    orders: async ({ status } = {}) => {
      const data = ALL_ORDERS.map(o => ({ ...o, amount: o.amount }));
      return status ? data.filter(o => o.status === status) : data;
    },
    ordersByStatus: async () => {
      const groups = {};
      ALL_ORDERS.forEach(o => { groups[o.status] = (groups[o.status] || 0) + 1; });
      return Object.entries(groups).map(([label, value]) => ({ label, value }));
    },
  };
</script>
</body>
</html>
